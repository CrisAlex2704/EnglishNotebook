        tailwind.config = {

  <style>
         @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .sidebar-active {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white !important;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .sidebar-closed { transform: translateX(-100%); }
        .sidebar-open { transform: translateX(0); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        
         /* Animación para el icono de voz mientras procesa */
        @keyframes pulse-audio {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; color: #6366f1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .audio-loading i {
            animation: pulse-audio 1s infinite ease-in-out;
        }

      /* Flashcard Flip Animation */
      .flip-card { perspective: 1000px; height: 350px; cursor: pointer; width: 100%; max-width: 450px; margin: 0 auto; }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 2.5rem;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .flip-card-back { transform: rotateY(180deg); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-card { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>

        async function speak(text, btnElement) {
            if (btnElement) btnElement.classList.add('audio-loading');
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say this naturally in English: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: {
                                voiceConfig: {
                                    prebuiltVoiceConfig: { voiceName: "Kore" } 
                                }
                            }
                        }
                    })
                });

                if (!response.ok) throw new Error('TTS API no disponible');
                
                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                const mimeType = result.candidates[0].content.parts[0].inlineData.mimeType;
                const sampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || 24000);

                playAudioFromPCM(audioData, sampleRate);
            } catch (error) {
                console.warn("Usando fallback de voz básica:", error);
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } finally {
                if (btnElement) btnElement.classList.remove('audio-loading');
            }
        }

        function playAudioFromPCM(base64Data, sampleRate) {
            const binary = atob(base64Data);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

            // Crear el Header WAV para que el navegador lo entienda
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            view.setUint32(0, 0x52494646, false); // "RIFF"
            view.setUint32(4, 36 + bytes.length, true);
            view.setUint32(8, 0x57415645, false); // "WAVE"
            view.setUint32(12, 0x666d7420, false); // "fmt "
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); // "data"
            view.setUint32(40, bytes.length, true);

            const blob = new Blob([header, bytes], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            new Audio(url).play();
        }

        function checkPractice() {
            const input = document.getElementById('practice-input');
            const feedback = document.getElementById('feedback-message');
            const userAnswer = input.value.trim().toLowerCase();
            const correctWord = currentPracticeWord.word.toLowerCase();

            if (userAnswer === correctWord) {
                input.className = "w-full p-5 rounded-2xl border-2 outline-none text-center text-2xl font-bold transition-all correct-answer text-green-700 dark:text-green-300";
                feedback.innerHTML = `<span class="text-green-500">¡Correcto!</span>`;
                feedback.classList.remove('opacity-0');
                
                if (!hasMistakeInCurrentWord) {
                    score++;

                totalAnswered++;
                
                speak(currentPracticeWord.word);
                
                setTimeout(() => {
                    practiceSessionWords.shift();
                    renderPracticeMode();
                }, 1200);
            } else {
                hasMistakeInCurrentWord = true; 
                input.className = "w-full p-5 rounded-2xl border-2 outline-none text-center text-2xl font-bold transition-all wrong-answer text-red-700 dark:text-red-300";

        }

        /**
         * Inicializa la sesión de flashcards filtrando por unidad o modo aleatorio.
         */
        function initFlashcards(mode) {
            let filtered = [];
            if (mode === 'random') {
                // Selecciona 15 palabras aleatorias de todo el nivel actual
                filtered = [...vocabulary]
                    .filter(v => v.level === activeLevel)
                    .sort(() => Math.random() - 0.5)
                    .slice(0, 15);
            } else {
                // Filtra por la unidad específica seleccionada
                filtered = vocabulary.filter(v => v.level === activeLevel && v.unit == mode);
            }

            if (filtered.length === 0) {
                const area = document.getElementById('content-area');
                area.innerHTML = `
                    <div class="text-center py-20">
                        <p class="text-slate-400 text-lg mb-4">No hay palabras disponibles para esta selección.</p>
                        <button onclick="renderFlashcardSetup()" class="px-6 py-2 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors">Volver</button>
                    </div>`;
                return;
            }

            flashcardState.list = filtered;
            flashcardState.currentIndex = 0;
            flashcardState.isFlipped = false;
            renderFlashcardUI();
        }

        /**
         * Mezcla el orden de las tarjetas actuales.
         */
        function shuffleFlashcards() {
            flashcardState.list = [...flashcardState.list].sort(() => Math.random() - 0.5);
            flashcardState.currentIndex = 0;
            flashcardState.isFlipped = false;
            renderFlashcardUI();
        }

        /**
         * Alterna entre el frente (inglés) y el dorso (traducción).
         */
        function flipCard() {
            const card = document.getElementById('main-card');
            if(card) { 
                card.classList.toggle('flipped'); 
                flashcardState.isFlipped = !flashcardState.isFlipped; 
            }
        }

        /**
         * Avanza a la siguiente tarjeta reiniciando el estado de giro.
         */
        function nextCard() {
            if(flashcardState.currentIndex < flashcardState.list.length - 1) {
                flashcardState.currentIndex++; 
                flashcardState.isFlipped = false; 
                renderFlashcardUI();
            } else { 
                renderFlashcardsComplete(); 
            }
        }

        /**
         * Retrocede a la tarjeta anterior.
         */
        function prevCard() {
            if(flashcardState.currentIndex > 0) {
                flashcardState.currentIndex--; 
                flashcardState.isFlipped = false; 
                renderFlashcardUI();
            }
        }

        function renderFlashcardUI() {
            const area = document.getElementById('content-area');
            const currentWord = flashcardState.list[flashcardState.currentIndex];
            const progress = ((flashcardState.currentIndex + 1) / flashcardState.list.length) * 100;
            area.innerHTML = `
                <div class="animate-content max-w-2xl mx-auto space-y-8">
                    <div class="flex items-center justify-between bg-white dark:bg-slate-900 p-4 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm">
                        <button onclick="renderFlashcardSetup()" class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-slate-50 transition-colors"><i class="fas fa-times text-slate-400"></i></button>
                        <div class="text-center"><span class="block text-[10px] font-black uppercase tracking-widest text-slate-400">Progreso</span><span class="text-sm font-bold">${flashcardState.currentIndex + 1} de ${flashcardState.list.length}</span></div>
                        <button onclick="shuffleFlashcards()" class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-slate-50 transition-colors"><i class="fas fa-random text-pink-500"></i></button>
                    </div>
                    <div class="h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden"><div class="h-full bg-pink-500 transition-all duration-500" style="width: ${progress}%"></div></div>
                    <div id="main-card" class="flip-card animate-card ${flashcardState.isFlipped ? 'flipped' : ''}" onclick="flipCard()">
                        <div class="flip-card-inner">
                            <div class="flip-card-front bg-indigo-600 text-white">
                                <span class="text-[10px] font-black uppercase tracking-[0.3em] mb-4 text-indigo-200">Inglés</span>
                                <h3 class="text-5xl font-black mb-6 select-none">${currentWord.word}</h3>
                                <button onclick="event.stopPropagation(); speak('${currentWord.word}')" class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center hover:bg-white/40"><i class="fas fa-volume-up"></i></button>
                            </div>
                            <div class="flip-card-back bg-white dark:bg-slate-900 border-2 border-indigo-50 dark:border-indigo-900/50">
                                <span class="text-[10px] font-black uppercase tracking-[0.3em] mb-4 text-slate-400">Traducción</span>
                                <h3 class="text-4xl font-bold text-slate-800 dark:text-white mb-6 select-none">${currentWord.def}</h3>
                                <div class="p-6 bg-slate-50 dark:bg-slate-800/50 rounded-[2rem] border border-slate-100 dark:border-slate-800"><p class="text-sm italic text-slate-500 leading-relaxed text-center">"${currentWord.example}"</p></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center justify-center gap-6 pt-4">
                        <button onclick="prevCard()" class="w-16 h-16 rounded-3xl bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 flex items-center justify-center text-slate-400 hover:text-indigo-600 transition-all disabled:opacity-30" ${flashcardState.currentIndex === 0 ? 'disabled' : ''}><i class="fas fa-arrow-left"></i></button>
                        <button onclick="nextCard()" class="px-10 h-16 rounded-3xl bg-indigo-600 text-white font-bold flex items-center justify-center gap-3 hover:bg-indigo-700 transition-all"><span>${flashcardState.currentIndex === flashcardState.list.length - 1 ? 'Finalizar' : 'Siguiente'}</span><i class="fas fa-arrow-right text-xs"></i></button>
                    </div>
                </div>`;
        }

        function renderFlashcardsComplete() {
            const area = document.getElementById('content-area');
            area.innerHTML = `

                    </div>

        }
   
        function applyVocabFilters() {
            const searchTerm = document.getElementById('vocab-search').value.toLowerCase();
            const levelFilter = document.getElementById('filter-level').value;
            const unitFilter = document.getElementById('filter-unit').value;
            
            const filteredList = vocabulary.filter(v => {
                const matchesSearch = v.word.toLowerCase().includes(searchTerm) || v.def.toLowerCase().includes(searchTerm);
                const matchesLevel = levelFilter === 'all' || v.level === levelFilter;
                const matchesUnit = unitFilter === 'all' || v.unit == unitFilter;
                return matchesSearch && matchesLevel && matchesUnit;
            });

            const grid = document.getElementById('vocab-grid');
            grid.innerHTML = filteredList.length > 0 ? filteredList.map(v => renderWordCard(v)).join('') : '<div class="col-span-full text-center py-20 text-slate-400">Sin resultados.</div>';
        }

        function renderWordCard(v) {

                        <h2 class="text-4xl font-extrabold text-slate-900 dark:text-white italic">${title}</h2>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-10 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 shadow-sm">
                        <h3 class="text-xl font-bold mb-4 text-slate-800 dark:text-slate-100">Enfoque gramatical</h3>
                        <p class="text-slate-600 dark:text-slate-400 mb-8 leading-relaxed">${desc}</p>
                    </div>
                </div>
            `;
        }

        function renderEmptyUnit(area, num) {
            area.innerHTML = `
                <div class="text-center py-20 animate-content">
                    <div class="w-20 h-20 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-lock text-slate-300 text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">${activeLevel} - Unidad ${num}</h2>
                    <p class="text-slate-500 mb-6 italic">Contenido para este nivel próximamente...</p>
                </div>
            `;
        }

        function saveWord() {
            const word = document.getElementById('v-word').value;
            const def = document.getElementById('v-def').value;
            const example = document.getElementById('v-example').value;
            const level = document.getElementById('v-level').value;
            const unit = parseInt(document.getElementById('v-unit').value);
            
            if(!word || !def) return;

            const newWord = { word, def, example, unit, level };

            if (editingIndex !== null) {
                vocabulary[editingIndex] = newWord;
                cancelEdit();
            } else {
                vocabulary.unshift(newWord);
            }
            
            // Limpiar campos si no es edit
            if (editingIndex === null) {
                document.getElementById('v-word').value = '';
                document.getElementById('v-def').value = '';
                document.getElementById('v-example').value = '';
            }
            
            renderVocab();
        }

        function editWord(index) {
            editingIndex = index;
            const item = vocabulary[index];
            
            document.getElementById('v-word').value = item.word;
            document.getElementById('v-def').value = item.def;
            document.getElementById('v-example').value = item.example || '';
            document.getElementById('v-level').value = item.level;
            document.getElementById('v-unit').value = item.unit;
            
            document.getElementById('form-title').innerText = "Editando Palabra";
            document.getElementById('btn-text').innerText = "Actualizar Palabra";
            document.getElementById('btn-save').classList.replace('bg-indigo-600', 'bg-blue-600');
            document.getElementById('btn-cancel').classList.remove('hidden');
            
            // Scroll al formulario
            document.getElementById('vocab-form').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelEdit() {
            editingIndex = null;
            document.getElementById('v-word').value = '';
            document.getElementById('v-def').value = '';
            document.getElementById('v-example').value = '';
            
            document.getElementById('form-title').innerText = "Nueva Palabra";
            document.getElementById('btn-text').innerText = "Añadir al Baúl";
            document.getElementById('btn-save').classList.replace('bg-blue-600', 'bg-indigo-600');
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        function openDeleteModal(index) {
            deleteTargetIndex = index;
            document.getElementById('delete-modal').classList.remove('hidden');
            document.getElementById('confirm-delete-btn').onclick = executeDelete;
        }

        function closeDeleteModal() {
            deleteTargetIndex = null;
            document.getElementById('delete-modal').classList.add('hidden');
        }

        function executeDelete() {
            if (deleteTargetIndex !== null) {
                vocabulary.splice(deleteTargetIndex, 1);
                renderVocab();
            }
            closeDeleteModal();
        }

        function renderVocab() {
            const search = document.getElementById('v-search').value.toLowerCase();
            const filterLevel = document.getElementById('v-filter-level').value;
            const filterUnit = document.getElementById('v-filter-unit').value;
            const container = document.getElementById('vocab-results');
            
            const filtered = vocabulary.map((v, i) => ({...v, originalIndex: i})).filter(v => {
                const matchesSearch = v.word.toLowerCase().includes(search) || 
                                    v.def.toLowerCase().includes(search) || 
                                    (v.example && v.example.toLowerCase().includes(search));
                const matchesLevel = filterLevel === 'all' || v.level === filterLevel;
                const matchesUnit = filterUnit === 'all' || v.unit.toString() === filterUnit;
                return matchesSearch && matchesLevel && matchesUnit;
            });

            container.innerHTML = filtered.length ? '' : '<div class="col-span-full py-20 text-center text-slate-400">No se encontraron palabras.</div>';
            
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-6 bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm animate-content group hover:shadow-md transition-all";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-black px-2 py-0.5 bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 rounded-md uppercase">
                            ${item.level} • Unidad ${item.unit}
                        </span>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="editWord(${item.originalIndex})" class="w-8 h-8 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 flex items-center justify-center hover:bg-blue-100 transition-colors">
                                <i class="fas fa-pencil-alt text-xs"></i>
                            </button>
                            <button onclick="openDeleteModal(${item.originalIndex})" class="w-8 h-8 rounded-full bg-red-50 dark:bg-red-900/30 text-red-600 flex items-center justify-center hover:bg-red-100 transition-colors">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <p class="text-lg font-extrabold text-slate-800 dark:text-white leading-tight">${item.word}</p>
                        <p class="text-sm font-medium text-slate-500 dark:text-slate-400">${item.def}</p>
                        ${item.example ? `
                            <div class="mt-3 pt-3 border-t border-slate-50 dark:border-slate-800">
                                <p class="text-xs italic text-slate-400 dark:text-slate-500 leading-relaxed">
                                    <i class="fas fa-quote-left mr-1 opacity-50"></i>${item.example}
                                </p>
                            </div>
                        ` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
